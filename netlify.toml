# netlify.toml — Netlify deploy config (sibling to vercel.json; both coexist).
# The booking logic is identical on both platforms (api/* + lib/*); only the
# function wrappers in netlify/functions/* and this file are Netlify-specific.

[build]
  # Catch ESM/extension/type errors before functions are bundled. This needs the
  # devDependencies (typescript), which Netlify installs by default — do NOT set
  # NODE_ENV=production in your site env, or npm skips devDeps and tsc goes missing.
  command = "npm run typecheck"
  # Static assets (placeholder landing page). Keeping a dedicated publish dir means
  # repo source files (lib/, api/) are NOT served as downloadable static files.
  publish = "public"
  # Each file here becomes a function; config.path in each maps it to /api/*.
  functions = "netlify/functions"

[build.environment]
  # The app relies on native global fetch — require a Node that has it. (Some older
  # Netlify sites still default to Node 16, which has no global fetch and would crash
  # every handler at runtime.)
  NODE_VERSION = "20"

[functions]
  # TS/MTS functions are bundled with esbuild, which resolves the ".js" import
  # extensions (e.g. ../../api/ghl.js -> ghl.ts) the same way the Vercel build does.
  node_bundler = "esbuild"

# Latency note: Netlify Functions default to US East (cmh / Ohio). Netlify DOES
# support the same region as the Vercel pin — pdx (US West, Oregon, near VAPI's
# us-west-2) — but it's set in the UI (Project config → Build & deploy → Functions
# region) on Pro/Enterprise plans, not from this file. Free/config-file region
# pinning is the one thing Vercel (vercel.json `regions`) does that Netlify doesn't.
# If the VAPI legs feel slow on Netlify, switch the functions region to pdx there.

# ── One-click "Deploy to Netlify" env prompts (parity with the Vercel button) ──
# Shown in the deploy UI so the user fills these before the first build.
[template.environment]
  GHL_PIT = "GoHighLevel Private Integration Token (calendars + contacts scopes)"
  GHL_CALENDAR_ID = "The calendar to book into"
  GHL_LOCATION_ID = "Your GHL sub-account (location) id"
  GHL_ASSIGNED_USER_ID = "Optional: user the appointment is assigned to (drives which Gmail it syncs to)"
  GHL_TIMEZONE = "IANA tz of the calendar, e.g. America/Chicago (default America/New_York)"
  VAPI_ASSISTANT_ID = "The assistant /api/assistant-request returns"
  SMS_PROVIDER = "ghl (default) | twilio | telnyx | vapi"
  # No cache vars: on Netlify the per-call cache uses built-in Netlify Blobs
  # (auto-provisioned, zero config). Nothing for the user to set up.
